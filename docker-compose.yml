services:
  app:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - url_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/urls.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  url_data:
